# Firebase App Hosting config for party-rental-app.
# Public NEXT_PUBLIC_* values are baked into the client bundle at BUILD time.
# Server-only admin creds are RUNTIME; the private key comes from Secret Manager.
runConfig:
  minInstances: 0
  maxInstances: 2

env:
  # --- Public Firebase web config (safe to commit) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDc999AEEUnACK42GyjX2vixY-e7EdZhhQ
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: party-rental-form.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: party-rental-form
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: party-rental-form.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "9512901704"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:9512901704:web:228959e22f805d9a110c7d
    availability: [BUILD, RUNTIME]

  # --- Branding ---
  - variable: NEXT_PUBLIC_BUSINESS_NAME
    value: "Party Supplies La Poblanita 2"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_BUSINESS_PHONE
    value: "818.982.5234"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_OWNER_CELL
    value: "818.321.0663"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_BUSINESS_ADDRESS
    value: "12034 Vanowen Street, North Hollywood, CA 91605"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_BUSINESS_WEBSITE
    value: "https://ezbookaparty.com"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_ZELLE_NUMBER
    value: "747.389.8112"
    availability: [BUILD, RUNTIME]

  # Google Places autocomplete (public client key, restricted by HTTP referrer)
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: AIzaSyB9IXr1TcVSfX4ZsZLDugxlKn_7CONtYK8
    availability: [BUILD, RUNTIME]

  # --- Server-only admin credentials ---
  - variable: FIREBASE_PROJECT_ID
    value: party-rental-form
    availability: [RUNTIME]
  - variable: FIREBASE_CLIENT_EMAIL
    value: firebase-adminsdk-fbsvc@party-rental-form.iam.gserviceaccount.com
    availability: [RUNTIME]
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability: [RUNTIME]

  # --- Email (Gmail SMTP) ---
  - variable: GMAIL_USER
    value: ezbookaparty@gmail.com
    availability: [RUNTIME]
  - variable: MAIL_FROM_NAME
    value: "Party Supplies La Poblanita 2"
    availability: [RUNTIME]
  - variable: GMAIL_APP_PASSWORD
    secret: gmail-app-password
    availability: [RUNTIME]
